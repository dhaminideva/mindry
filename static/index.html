<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mindry — Think Out Loud</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6ef2;
    --accent2: #5de4c7;
    --warn: #f5a623;
    --danger: #e05252;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .state-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .state-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .state-dot.active { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  .state-dot.busy   { background: var(--accent);  box-shadow: 0 0 8px var(--accent); }
  .state-dot.warn   { background: var(--warn);    box-shadow: 0 0 8px var(--warn); }

  /* ── Layout ── */
  .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 61px); }

  /* ── Left panel: input ── */
  .panel-left {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    padding: 24px;
    gap: 16px;
  }

  .input-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 200px;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 10px; }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 20px;
    transition: all 0.15s;
  }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #9b8cf5);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-mic {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-mic:hover { border-color: var(--accent2); background: rgba(93,228,199,0.1); }
  .btn-mic.recording {
    background: rgba(224,82,82,0.15);
    border-color: var(--danger);
    color: var(--danger);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .btn-interrupt {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--warn);
    padding: 12px 16px;
  }
  .btn-interrupt:hover { border-color: var(--warn); background: rgba(245,166,35,0.1); }

  .hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  /* ── Right panel: results ── */
  .panel-right {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); opacity: 0.4; }
  .empty-state p { font-size: 14px; max-width: 320px; line-height: 1.6; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .card-icon { font-size: 18px; }
  .card-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }

  /* Goal card */
  .goal-text {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }
  .meta-row {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-emotion { background: rgba(124,110,242,0.15); color: var(--accent); border: 1px solid rgba(124,110,242,0.3); }
  .tag-confidence { background: rgba(93,228,199,0.1); color: var(--accent2); border: 1px solid rgba(93,228,199,0.2); }

  /* Constraints */
  .constraint-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .constraint-list li {
    font-size: 14px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  /* Conflicts */
  .conflict-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .conflict-list li {
    font-size: 14px;
    padding: 10px 14px;
    background: rgba(224,82,82,0.07);
    border-radius: 8px;
    border-left: 3px solid var(--danger);
    color: #f08080;
  }

  /* Questions */
  .question-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .question-list li {
    font-size: 14px;
    padding: 10px 14px;
    background: rgba(245,166,35,0.07);
    border-radius: 8px;
    border-left: 3px solid var(--warn);
    color: #f5c96a;
  }

  /* Roadmap */
  .roadmap-summary {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
    font-style: italic;
  }
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .step:hover { border-color: var(--accent); }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #9b8cf5);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-content { flex: 1; }
  .step-action { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .step-rationale { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .step-time {
    font-size: 11px;
    color: var(--accent2);
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* Metrics bar */
  .metrics-bar {
    display: flex;
    gap: 20px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .metric { font-size: 12px; color: var(--muted); }
  .metric span { color: var(--accent2); font-weight: 600; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Memory tab */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    transition: all 0.2s;
    background: none;
    border-radius: 0;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  .memory-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .memory-item:hover { border-color: var(--accent); }
  .memory-goal { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .memory-meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .btn-tts {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-tts:hover { border-color: var(--accent); color: var(--accent); }
  .btn-tts.speaking {
    border-color: var(--accent2);
    color: var(--accent2);
    animation: pulse 1.2s ease-in-out infinite;
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Mindry</div>
  <div class="state-badge">
    <div class="state-dot" id="stateDot"></div>
    <span id="stateLabel">IDLE</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('think')">Think</button>
  <button class="tab" onclick="showTab('memory')">Memory</button>
  <button class="tab" onclick="showTab('metrics')">Metrics</button>
  <button class="tab" onclick="showTab('patterns')">Patterns</button>
</div>

<div class="app">
  <!-- Left: Input -->
  <div class="panel-left">
    <div class="input-label">Your Thought</div>
    <textarea id="thoughtInput"
      placeholder="Just talk. Dump everything on your mind — raw, messy, nonlinear. Mindry will structure it.&#10;&#10;Example: 'I want to start a business but I have no money and my partner thinks it's a bad idea and I'm not sure if I should quit my job first or after I get my first customer but I don't even know what the product should be...'"></textarea>

    <div class="btn-row">
      <button class="btn-primary" id="thinkBtn" onclick="submitThought()">
        Structure This →
      </button>
      <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Speak">🎤</button>
      <button class="btn-tts" id="ttsBtn" onclick="toggleTTS()" title="Read response aloud">🔊</button>
      <button class="btn-interrupt" onclick="sendInterrupt()" title="Interrupt">⚡</button>
    </div>

    <div class="hint" id="micHint">
      Press <strong>🎤</strong> to speak your thought.<br/>
      Press <strong>⚡</strong> to interrupt mid-processing.
    </div>
  </div>

  <!-- Right: Results -->
  <div class="panel-right" id="resultPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🧠</div>
      <h2>Ready to structure your thoughts</h2>
      <p>Type or paste any messy, unstructured thought. Mindry will extract your goal, detect conflicts, and build an action plan.</p>
    </div>
  </div>
</div>

<!-- Memory Tab -->
<div id="memoryTab" style="display:none; flex:1; overflow-y:auto; padding:24px; flex-direction:column; gap:16px;"></div>

<!-- Metrics Tab -->
<!-- Metrics Tab -->
<div id="metricsTab" style="display:none; flex:1; padding:24px;"></div>

<!-- Patterns Tab -->
<div id="patternsTab" style="display:none; flex:1; overflow-y:auto; padding:24px; flex-direction:column; gap:20px;"></div>

<script>
const API = '';  // empty = same origin
let ws = null;
let currentTab = 'think';

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'processing') updateState(msg.state);
    if (msg.type === 'result') renderResult(msg.data);
    if (msg.type === 'interrupted') {
      updateState('INTERRUPTED');
      setLoading(false);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
connectWS();

// ── State ─────────────────────────────────────────────────────────────────
function updateState(state) {
  document.getElementById('stateLabel').textContent = state;
  const dot = document.getElementById('stateDot');
  dot.className = 'state-dot';
  if (['EXTRACTING','STRUCTURING','VERIFYING'].includes(state)) dot.classList.add('busy');
  else if (['COMPLETED'].includes(state)) dot.classList.add('active');
  else if (['INTERRUPTED','REFINING'].includes(state)) dot.classList.add('warn');
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function submitThought() {
  const text = document.getElementById('thoughtInput').value.trim();
  if (!text) return;

  setLoading(true);
  document.getElementById('emptyState')?.remove();

  // Use WS if connected, else REST fallback
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'thought', text }));
  } else {
    try {
      const res = await fetch('/think', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: text }),
      });
      const data = await res.json();
      renderResult(data);
    } catch (e) {
      setLoading(false);
      alert('Error: ' + e.message);
    }
  }
}

async function sendInterrupt() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interrupt' }));
  } else {
    await fetch('/interrupt', { method: 'POST' });
  }
  updateState('INTERRUPTED');
  setLoading(false);
}

// ── Render Result ─────────────────────────────────────────────────────────
function renderResult(data) {
  setLoading(false);
  updateState(data.state);
  speakText(buildSpeechSummary(data)); 

  const panel = document.getElementById('resultPanel');
  // Clear old results
  panel.innerHTML = '';

  // System message
// System message
  if (data.message) {
    const isBlocked = !data.thought && !data.roadmap;
    if (isBlocked) {
      // Guardrail triggered — show helpful card
      const card = document.createElement('div');
      card.style.cssText = `
        background: rgba(245,166,35,0.07);
        border: 1px solid rgba(245,166,35,0.35);
        border-radius: 12px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      `;
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:24px;">🛡️</span>
          <span style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--warn);">Heads up</span>
        </div>
        <div style="font-size:16px;line-height:1.6;color:var(--text);">${esc(data.message)}</div>
        ${data.clarifying_questions?.length ? `
          <div style="font-size:14px;color:var(--muted);line-height:1.6;">
            💡 ${esc(data.clarifying_questions[0])}
          </div>
          <button onclick="
            document.getElementById('thoughtInput').value = '';
            document.getElementById('thoughtInput').focus();
            window.speechSynthesis && window.speechSynthesis.cancel();
          " style="
            align-self:flex-start;
            background: rgba(245,166,35,0.15);
            border: 1px solid var(--warn);
            color: var(--warn);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size:13px;
            font-weight:600;
          ">✏️ Rephrase my thought</button>
        ` : ''}
      `;
      panel.appendChild(card);
    } else {
      // Normal status message
      const msg = document.createElement('div');
      msg.style.cssText = 'font-size:14px;color:var(--muted);padding:4px 0;';
      msg.textContent = `→ ${data.message}`;
      panel.appendChild(msg);
    }
  }

  // Thought card
  if (data.thought?.primary_goal) {
    panel.appendChild(card('🎯', 'Primary Goal', `
      <div class="goal-text">${esc(data.thought.primary_goal)}</div>
      <div class="meta-row">
        <span class="tag tag-emotion">😌 ${esc(data.thought.emotional_state)}</span>
        <span class="tag tag-confidence">⚡ ${Math.round(data.thought.confidence_score * 100)}% confidence</span>
      </div>
    `));
  }

  // Constraints
  if (data.thought?.constraints?.length) {
    panel.appendChild(card('📌', 'Constraints', `
      <ul class="constraint-list">
        ${data.thought.constraints.map(c => `<li>${esc(c)}</li>`).join('')}
      </ul>
    `));
  }

  // Conflicts
  if (data.conflicts?.length) {
    panel.appendChild(card('⚠️', 'Conflicts Detected', `
      <ul class="conflict-list">
        ${data.conflicts.map(c => `<li>${esc(c)}</li>`).join('')}
      </ul>
    `));
  }

  // Clarifying questions
  if (data.clarifying_questions?.length) {
    panel.appendChild(card('❓', 'Before I can plan — clarify these', `
      <ul class="question-list">
        ${data.clarifying_questions.map(q => `<li>${esc(q)}</li>`).join('')}
      </ul>
    `));
  }

  // Roadmap
  if (data.roadmap?.steps?.length) {
    const stepsHtml = data.roadmap.steps.map(s => `
      <div class="step">
        <div class="step-num">${s.step_number}</div>
        <div class="step-content">
          <div class="step-action">${esc(s.action)}</div>
          <div class="step-rationale">${esc(s.rationale)}</div>
          <div class="step-time">⏱ ${esc(s.time_estimate)}</div>
        </div>
      </div>
    `).join('');
    panel.appendChild(card('🗺️', 'Your Roadmap', `
      <div class="roadmap-summary">${esc(data.roadmap.summary)}</div>
      <div class="steps">${stepsHtml}</div>
    `));
  }

  // Metrics
  if (data.metrics?.latest_latency_ms) {
    const m = data.metrics;
    const bar = document.createElement('div');
    bar.className = 'metrics-bar';
    bar.innerHTML = `
      <div class="metric">Latency: <span>${m.latest_latency_ms}ms</span></div>
      <div class="metric">Avg: <span>${m.avg_latency_ms}ms</span></div>
      <div class="metric">p95: <span>${m.p95_latency_ms}ms</span></div>
      <div class="metric">Requests: <span>${m.total_requests}</span></div>
      <div class="metric">Interrupts: <span>${m.interrupt_count}</span></div>
    `;
    panel.appendChild(bar);
  }
}

function card(icon, title, bodyHtml) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${icon}</span>
      <span class="card-title">${title}</span>
    </div>
    ${bodyHtml}
  `;
  return el;
}

function setLoading(on) {
  const btn = document.getElementById('thinkBtn');
  const panel = document.getElementById('resultPanel');
  btn.disabled = on;

  document.getElementById('loadingEl')?.remove();
  if (on) {
    const el = document.createElement('div');
    el.id = 'loadingEl';
    el.className = 'loading';
    el.innerHTML = '<div class="spinner"></div> Structuring your thought…';
    panel.prepend(el);
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['think','memory','metrics','patterns'][i] === tab);
    });

  const app = document.querySelector('.app');
  const memTab = document.getElementById('memoryTab');
  const metTab = document.getElementById('metricsTab');

  const patTab = document.getElementById('patternsTab');

  app.style.display = tab === 'think' ? 'flex' : 'none';
  memTab.style.display = tab === 'memory' ? 'flex' : 'none';
  metTab.style.display = tab === 'metrics' ? 'block' : 'none';
  patTab.style.display = tab === 'patterns' ? 'flex' : 'none';

  if (tab === 'memory') loadMemory();
  if (tab === 'metrics') loadMetrics();
  if (tab === 'patterns') loadPatterns();
}

let selectedMemoryId = null;

async function loadMemory() {
  const tab = document.getElementById('memoryTab');
  tab.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
  const res = await fetch('/memory');
  const items = await res.json();
  tab.innerHTML = '';

  if (!items.length) {
      tab.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center;">No recordings yet. Every voice thought is saved automatically.</div>';
      return;
    }

    // Debug: log what we got
  console.log('Memory items:', items);

  // Layout: list on left, detail on right
  tab.style.flexDirection = 'row';
  tab.style.gap = '20px';
  tab.style.alignItems = 'flex-start';

  const list = document.createElement('div');
  list.style.cssText = 'width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;';

  const detail = document.createElement('div');
  detail.id = 'memoryDetail';
  detail.style.cssText = 'flex:1;';
  detail.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center;">← Select a recording to view analysis</div>';

  items.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'memory-item';
    el.id = `mem-${item.idea_id}`;
    el.style.cursor = 'pointer';
    const recCount = item.recordings?.length || 0;
    el.innerHTML = `
      <div class="memory-goal">${esc(item.primary_goal || 'Voice Recording')}</div>
      <div class="memory-meta" style="margin-top:6px;">
        <span>🎤 ${recCount} recording${recCount !== 1 ? 's' : ''}</span>
        <span>⚡ ${Math.round((item.confidence_score||0)*100)}%</span>
        <span>🕐 ${new Date(item.date_created).toLocaleDateString()}</span>
      </div>
    `;
    el.onclick = () => showMemoryDetail(item, el);
    list.appendChild(el);
    // Auto-select first
    if (idx === 0) setTimeout(() => el.click(), 50);
  });

  tab.appendChild(list);
  tab.appendChild(detail);
}

function showMemoryDetail(item, el) {
  // Highlight selected
  document.querySelectorAll('.memory-item').forEach(e => e.style.borderColor = '');
  el.style.borderColor = 'var(--accent)';

  const detail = document.getElementById('memoryDetail');
  const recordings = item.recordings || [];

  const recordingsHtml = recordings.length ? recordings.map((r, i) => `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:700;color:var(--accent2);">🎤 Recording ${i + 1}</span>
        <span style="font-size:11px;color:var(--muted);">${new Date(r.timestamp).toLocaleString()}</span>
      </div>
      <div style="font-size:14px;color:var(--text);line-height:1.6;font-style:italic;">"${esc(r.transcript)}"</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;">Confidence: ${Math.round((r.confidence||0)*100)}%</div>
    </div>
  `).join('') : '<div style="color:var(--muted);font-size:13px;">No recordings stored for this entry.</div>';

  const conflictsHtml = item.conflicts_detected?.length
    ? item.conflicts_detected.map(c => `<li style="color:#f08080;font-size:14px;padding:8px 12px;background:rgba(224,82,82,0.07);border-radius:6px;border-left:3px solid var(--danger);">${esc(c)}</li>`).join('')
    : '<li style="color:var(--muted);font-size:13px;">None detected</li>';

  const constraintsHtml = item.constraints?.length
    ? item.constraints.map(c => `<li style="font-size:14px;padding:8px 12px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--accent);">${esc(c)}</li>`).join('')
    : '<li style="color:var(--muted);font-size:13px;">None</li>';

  detail.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px;">

      <div class="card">
        <div class="card-header"><span class="card-icon">🎯</span><span class="card-title">Primary Goal</span></div>
        <div style="font-size:20px;font-weight:600;">${esc(item.primary_goal || 'Not extracted')}</div>
        <div class="meta-row">
          <span class="tag tag-emotion">😌 ${esc(item.emotional_state || 'unknown')}</span>
          <span class="tag tag-confidence">⚡ ${Math.round((item.confidence_score||0)*100)}% confidence</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-icon">🎤</span><span class="card-title">Voice Recordings (${recordings.length})</span></div>
        ${recordingsHtml}
      </div>

      <div class="card">
        <div class="card-header"><span class="card-icon">📌</span><span class="card-title">Constraints</span></div>
        <ul class="constraint-list">${constraintsHtml}</ul>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-icon">⚠️</span><span class="card-title">Conflicts</span></div>
        <ul class="conflict-list">${conflictsHtml}</ul>
      </div>

      <div style="display:flex;gap:10px;">
        <button onclick="speakMemory('${esc(item.primary_goal || '')}', '${esc((item.conflicts_detected||[]).join('. '))}')"
          style="background:var(--surface2);border:1px solid var(--border);color:var(--accent2);padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">
          🔊 Read Aloud
        </button>
        <button onclick="deleteMemory('${item.idea_id}')"
          style="background:rgba(224,82,82,0.1);border:1px solid var(--danger);color:var(--danger);padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">
          🗑 Delete
        </button>
      </div>
    </div>
  `;
}

function speakMemory(goal, conflicts) {
  let text = '';
  if (goal) text += `Your goal was: ${goal}. `;
  if (conflicts) text += `Conflicts: ${conflicts}.`;
  speakText(text);
}

async function deleteMemory(ideaId) {
  if (!confirm('Delete this recording and its analysis?')) return;
  await fetch(`/memory/${ideaId}`, { method: 'DELETE' });
  loadMemory();
}

async function loadMetrics() {
  const tab = document.getElementById('metricsTab');
  const res = await fetch('/metrics');
  const m = await res.json();
  tab.innerHTML = `
    <div style="max-width:600px;">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:20px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">System Metrics</h2>
      <div class="metrics-bar" style="flex-direction:column;gap:14px;">
        ${Object.entries(m).map(([k,v]) => `
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:14px;color:var(--muted);">${k.replace(/_/g,' ')}</span>
            <span style="font-size:16px;font-weight:700;color:var(--accent2);">${v}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// Keyboard shortcut: Cmd/Ctrl+Enter to submit
document.getElementById('thoughtInput').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submitThought();
});
// ── Voice Input (Web Speech API — free, built into browser) ───────────────
let recognition = null;
let isRecording = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Your browser does not support voice input.\nPlease use Chrome or Edge.');
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;       // keep listening until stopped
  recognition.interimResults = true;   // show words as you speak
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('micHint').innerHTML = '<strong style="color:var(--danger)">● Recording...</strong> Click ⏹ to stop and structure.';
    document.getElementById('thoughtInput').placeholder = 'Listening... speak your thought.';
  };

  recognition.onresult = (e) => {
    let finalText = '';
    let interimText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interimText += e.results[i][0].transcript;
    }
    document.getElementById('thoughtInput').value = finalText + interimText;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micHint').innerHTML = 'Press <strong>🎤</strong> to speak your thought.<br/>Press <strong>⚡</strong> to interrupt mid-processing.';
    document.getElementById('thoughtInput').placeholder = 'Just talk. Dump everything...';
    // Auto-submit if something was captured
    const text = document.getElementById('thoughtInput').value.trim();
    if (text) submitThought();
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    if (e.error === 'not-allowed') {
      alert('Microphone access denied.\nClick the 🔒 icon in your browser address bar and allow microphone.');
    }
  };

  recognition.start();
}
// ── Text-to-Speech (Web Speech Synthesis API — free, built-in) ────────────
let ttsEnabled = true;   // auto-speaks after each result by default
let currentUtterance = null;

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById('ttsBtn');
  if (ttsEnabled) {
    btn.style.borderColor = '';
    btn.style.color = '';
    btn.title = 'Read response aloud (ON)';
    btn.textContent = '🔊';
  } else {
    window.speechSynthesis.cancel();
    btn.style.borderColor = 'var(--muted)';
    btn.style.color = 'var(--muted)';
    btn.title = 'Read response aloud (OFF)';
    btn.textContent = '🔇';
  }
}

function speakText(text) {
  if (!ttsEnabled) return;
  if (!('speechSynthesis' in window)) return;

  // Cancel anything currently speaking
  window.speechSynthesis.cancel();

  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.rate = 1.05;   // slightly faster than default
  currentUtterance.pitch = 1.0;
  currentUtterance.volume = 1.0;

  // Pick a good voice if available
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.includes('Google') ||
    v.name.includes('Samantha') ||
    v.name.includes('Daniel') ||
    (v.lang === 'en-US' && v.localService)
  );
  if (preferred) currentUtterance.voice = preferred;

  const btn = document.getElementById('ttsBtn');
  currentUtterance.onstart = () => {
    btn.classList.add('speaking');
    btn.textContent = '🔊';
  };
  currentUtterance.onend = () => {
    btn.classList.remove('speaking');
  };
  currentUtterance.onerror = () => {
    btn.classList.remove('speaking');
  };

  window.speechSynthesis.speak(currentUtterance);
}

function buildSpeechSummary(data) {
  const parts = [];

  if (data.thought?.primary_goal) {
    parts.push(`Your primary goal is: ${data.thought.primary_goal}.`);
  }
  if (data.conflicts?.length) {
    parts.push(`I detected ${data.conflicts.length} conflict${data.conflicts.length > 1 ? 's' : ''}: ${data.conflicts.join('. ')}.`);
  }
  if (data.clarifying_questions?.length) {
    parts.push(`Before I can plan, I need to ask: ${data.clarifying_questions[0]}`);
  }
  if (data.roadmap?.summary) {
    parts.push(`Here is your plan. ${data.roadmap.summary}.`);
    if (data.roadmap.steps?.length) {
      data.roadmap.steps.forEach(s => {
        parts.push(`Step ${s.step_number}: ${s.action}.`);
      });
    }
  }
  if (!parts.length && data.message) {
    parts.push(data.message);
  }

  return parts.join(' ');
}
async function loadPatterns() {
  const tab = document.getElementById('patternsTab');
  tab.innerHTML = '<div class="loading"><div class="spinner"></div> Analysing your conflict history…</div>';

  const res = await fetch('/conflicts/timeline');
  const data = await res.json();
  tab.innerHTML = '';

  if (!data.total_conflicts) {
    tab.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center;">No conflicts tracked yet. Submit a few voice thoughts first.</div>';
    return;
  }

  // ── Summary bar ──────────────────────────────────────────────
  const summary = document.createElement('div');
  summary.className = 'metrics-bar';
  summary.innerHTML = `
    <div class="metric">Total conflicts logged: <span>${data.total_conflicts}</span></div>
    <div class="metric">Recurring patterns: <span>${data.recurring_count}</span></div>
  `;
  tab.appendChild(summary);

  // ── Recurring conflicts ───────────────────────────────────────
  if (data.recurring_count > 0) {
    const recCard = document.createElement('div');
    recCard.className = 'card';
    recCard.innerHTML = `
      <div class="card-header">
        <span class="card-icon">🔁</span>
        <span class="card-title">Recurring Conflicts — you keep coming back to these</span>
      </div>
    `;
    Object.entries(data.recurring_patterns).forEach(([conflict, entries]) => {
      const block = document.createElement('div');
      block.style.cssText = 'margin-bottom:16px;';
      block.innerHTML = `
        <div style="font-size:15px;font-weight:600;color:#f08080;margin-bottom:8px;">
          ⚠️ "${esc(conflict)}"
          <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:8px;">
            appeared ${entries.length} times
          </span>
        </div>
        ${entries.map(e => `
          <div style="display:flex;gap:12px;align-items:flex-start;padding:8px 12px;
            background:var(--surface2);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--danger);">
            <div style="font-size:11px;color:var(--muted);white-space:nowrap;margin-top:2px;">
              ${new Date(e.date).toLocaleDateString()}
            </div>
            <div style="font-size:13px;color:var(--muted);">
              While thinking about: <span style="color:var(--text);">${esc(e.primary_goal)}</span>
            </div>
          </div>
        `).join('')}
      `;
      recCard.appendChild(block);
    });
    tab.appendChild(recCard);
  }

  // ── Full timeline ─────────────────────────────────────────────
  const timelineCard = document.createElement('div');
  timelineCard.className = 'card';
  timelineCard.innerHTML = `
    <div class="card-header">
      <span class="card-icon">📅</span>
      <span class="card-title">Full Conflict Timeline</span>
    </div>
  `;
  [...data.all_conflicts].reverse().forEach(entry => {
    const row = document.createElement('div');
    row.style.cssText = `
      display:flex;gap:14px;align-items:flex-start;
      padding:12px;background:var(--surface2);
      border-radius:8px;margin-bottom:8px;
      border-left:3px solid rgba(224,82,82,0.4);
    `;
    row.innerHTML = `
      <div style="font-size:11px;color:var(--muted);white-space:nowrap;margin-top:3px;min-width:80px;">
        ${new Date(entry.date).toLocaleDateString()}
      </div>
      <div style="flex:1;">
        <div style="font-size:14px;color:#f08080;">${esc(entry.conflict)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">
          Goal at the time: ${esc(entry.primary_goal)}
        </div>
      </div>
      <span style="font-size:11px;padding:3px 8px;border-radius:20px;
        background:rgba(124,110,242,0.15);color:var(--accent);white-space:nowrap;">
        😌 ${esc(entry.emotional_state)}
      </span>
    `;
    timelineCard.appendChild(row);
  });
  tab.appendChild(timelineCard);
}
